apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: proxy-69
  namespace: argocd
spec:
  project: default
  source: 
    repoURL: https://gitlab.sadkomed.ru/k8s/helm.git
    targetRevision: main
    path: sadko_first
    helm:
      releaseName: proxy-69
      valueFiles:
        - values-proxy-69.yaml
  destination: 
    server: https://kubernetes.default.svc
    namespace: default
  ignoreDifferences:
    - group: discovery.k8s.io
      kind: EndpointSlice
      jqPathExpressions:
        - .endpoints[].conditions
  syncPolicy:
    automated:
      prune: true
      selfHeal: true