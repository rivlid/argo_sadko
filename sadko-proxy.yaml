apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: sadko-proxy
  namespace: argocd
spec:
  project: default
  source: 
    repoURL: https://gitlab.sadkomed.ru/k8s/helm.git
    targetRevision: main
    path: sadko_first
    helm:
      releaseName: sadko-proxy
  destination: 
    server: https://kubernetes.default.svc
    namespace: default
  syncPolicy:
    automated:
      prune: true
      selfHeal: true